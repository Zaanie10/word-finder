$(document).ready(function() {
	var dict = new Dictionary(words);
	// Your code here:

  // Function to update the word list based on search query
  function updateWordList(query) {
                var filteredWords = dict.filterWords(query);
                $('#wordList').empty();
                filteredWords.forEach(function(word) {
                    $('#wordList').append(new Option(word, word));
                });
                // Update the word count label
                $('#wordCount').text(filteredWords.length + ' word(s) containing "' + query + '"');
            }

            // Initial display of all words
            updateWordList('');

            // Handle input in the search field
            $('#searchInput').on('input', function() {
                var query = $(this).val();
                updateWordList(query);
            });

            // Handle the clear button click
            $('#clearButton').click(function() {
                $('#searchInput').val('');
                updateWordList('');
            });
        });
// ]]>
</script>
